<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Login - Alok Sharma</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Poppins:wght@100..900&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style>
      :root {
        --primary-foreground: #FFFFFF;
        --border: #EAEAEA;
        --ring: #B30000;
        --card: #FFFFFF;
        --background: #FFFFFF;
        --muted-foreground: #4A4A4A;
        --muted: #F8F8F8;
        --radius: 1.5rem;
        --secondary: #121212;
        --foreground: #121212;
        --primary: #B30000;
      }
    </style>
</head>
<body class="bg-[#F4F4F6] text-gray-900 font-sans min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-3xl border border-gray-200 shadow-xl overflow-hidden p-8 md:p-10 space-y-6">
        
        <!-- Header -->
        <div class="text-center">
            <h2 class="text-3xl font-bold tracking-tight text-gray-800">Portfolio <span class="text-red-600">Workspace</span></h2>
            <p class="text-xs text-gray-400 mt-2">Access your creative control panel</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="space-y-3">
                    {% for category, msg in messages %}
                        <div class="flash-alert p-4 rounded-xl border text-xs font-bold shadow-sm cursor-pointer {% if category == 'success' %}bg-green-50 text-green-800 border-green-200{% else %}bg-red-50 text-red-800 border-red-200{% endif %}" onclick="this.remove()">
                            {{ msg }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <!-- Form -->
        <form method="POST" class="space-y-6">
            <div class="flex flex-col gap-2 relative">
                <label class="text-sm font-bold text-gray-700">Workspace Password</label>
                <input class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-red-600 outline-none transition-all" name="password" required placeholder="Enter password..." type="password"/>
            </div>

            <!-- Forgot Password / Actions -->
            <div class="flex items-center justify-between text-xs">
                <a href="/admin/forgot-password" class="text-red-600 font-semibold hover:underline flex items-center gap-1">
                    <iconify-icon icon="lucide:key-round" class="text-sm"></iconify-icon>
                    Forgot Password?
                </a>
                <a href="/" class="text-gray-400 hover:text-gray-600 transition-colors font-medium">Back to Home</a>
            </div>

            <button type="submit" class="w-full py-4 bg-red-600 text-white rounded-full font-bold hover:bg-gray-900 transition-colors flex items-center justify-center gap-2 shadow-lg">
                <iconify-icon icon="lucide:log-in" class="text-lg"></iconify-icon>
                Access Dashboard
            </button>
        </form>
    </div>

    <script>
      // Auto-hide alert notifications after 2 seconds (2000ms)
      setTimeout(() => {
        document.querySelectorAll('.flash-alert').forEach(alert => {
          alert.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
          alert.style.opacity = '0';
          alert.style.transform = 'translateY(-10px)';
          setTimeout(() => alert.remove(), 500);
        });
      }, 2000);
    </script>
</body>
</html>
